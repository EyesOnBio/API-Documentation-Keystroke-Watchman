<!DOCTYPE html>
<html>
  <head>
    <title>Keystroke Dynamics API Documentation from EyesOnBio</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script> 
    <!-- <script src="redoc.standalone.js"></script> -->
  </head>
  <body>
     <!-- 1. Load the locally saved Redoc engine file -->
    <div id="keystroke-redoc-container"></div>
    <script>
      // 2. Fetch your locally saved FastAPI schema structure
      fetch('openapi.json')
        .then(response => response.json())
        .then(apiSpec => {
          // 3. Initialize Redoc completely offline
          Redoc.init(apiSpec, {}, document.getElementById('keystroke-redoc-container'));
        })
        .catch(err => console.error("Error loading local API schema:", err));
    </script>
  </body>
</html>
